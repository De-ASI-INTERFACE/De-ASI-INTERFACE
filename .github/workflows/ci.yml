name: CI — Test, Lint & Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Pytest Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff
          pip install numpy pandas httpx

      - name: Run linter (ruff)
        run: ruff check src/ tests/ --select E,F,W --ignore E501

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

      - name: Assert 100% test pass rate
        run: pytest tests/ --tb=short -q

  security-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify no secrets in source
        run: |
          grep -rn --include="*.py" --include="*.ts" --include="*.json" \
            -E '(api_key|private_key|secret|password|mnemonic)\s*=\s*["\x27][^$\{]' \
            src/ tests/ || echo "No hardcoded secrets found — CLEAN"
