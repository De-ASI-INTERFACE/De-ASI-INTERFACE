name: De-ASI-INTERFACE CI

on:
  push:
    branches: [Richy, main]
  pull_request:
    branches: [Richy, main]

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install linters
        run: pip install ruff mypy
      - name: Ruff lint
        run: ruff check . --ignore E501 || true
      - name: Type check
        run: mypy . --ignore-missing-imports || true

  lint-typescript:
    name: Lint TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
          fi
      - name: TypeScript check
        run: |
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit || true
          fi

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for hardcoded secrets
        run: |
          if grep -r "private_key\|secret_key\|api_key" --include="*.py" --include="*.ts" . | grep -v ".env" | grep -v "os.getenv" | grep -v "process.env" | grep -v ".env.example"; then
            echo "WARNING: Potential hardcoded secret detected"
            exit 1
          fi
          echo "Secret scan clean."
